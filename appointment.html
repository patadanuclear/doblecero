<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservar turno | DOBLECERO</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <a class="auth-brand" href="index.html">
      <span>DOBLECERO</span>
    </a>

    <section class="auth-card wide appointment-card">
      <div class="auth-intro">
        <p class="eyebrow">Reservas</p>
        <h1>Reservar turno</h1>
        <p>Elegi el servicio, fecha y detalles del proyecto. Si no tenes sesion iniciada, te mandamos al login.</p>
      </div>

      <form class="auth-form two-cols" id="appointmentForm" novalidate>
        <div class="form-alert" data-form-alert hidden></div>

        <label class="field">
          <span>Servicio</span>
          <select name="service" required>
            <option value="">Elegir servicio</option>
            <option value="Grabacion">Grabacion</option>
            <option value="Mixing">Mixing</option>
            <option value="Mastering">Mastering</option>
            <option value="Vocal Chain">Vocal Chain</option>
            <option value="Otro">Otro</option>
          </select>
          <small data-error-for="service"></small>
        </label>

        <label class="field">
          <span>Nombre artistico / cliente</span>
          <input type="text" name="artistName" placeholder="Nombre artistico o cliente" required />
          <small data-error-for="artistName"></small>
        </label>

        <label class="field">
          <span>Fecha</span>
          <input type="date" name="date" required />
          <small data-error-for="date"></small>
        </label>

        <label class="field">
          <span>Horario</span>
          <select name="time" required>
            <option value="">Elegir horario</option>
            <option value="16:00">16:00</option>
            <option value="16:30">16:30</option>
            <option value="17:00">17:00</option>
            <option value="17:30">17:30</option>
            <option value="18:00">18:00</option>
            <option value="18:30">18:30</option>
            <option value="19:00">19:00</option>
            <option value="19:30">19:30</option>
            <option value="20:00">20:00</option>
            <option value="20:30">20:30</option>
            <option value="21:00">21:00</option>
            <option value="21:30">21:30</option>
            <option value="22:00">22:00</option>
            <option value="22:30">22:30</option>
            <option value="23:00">23:00</option>
            <option value="23:30">23:30</option>
            <option value="00:00">00:00</option>
            <option value="00:30">00:30</option>
            <option value="01:00">01:00</option>
            <option value="01:30">01:30</option>
            <option value="02:00">02:00</option>
            <option value="02:30">02:30</option>
            <option value="03:00">03:00</option>
            <option value="03:30">03:30</option>
            <option value="04:00">04:00</option>
            <option value="04:30">04:30</option>
            <option value="05:00">05:00</option>
            <option value="05:30">05:30</option>
            <option value="06:00">06:00</option>
          </select>
          <small data-error-for="time" data-hint="Horarios disponibles: 16:00 a 06:00.">Horarios disponibles: 16:00 a 06:00.</small>
        </label>

        <label class="field full-field">
          <span>Observaciones</span>
          <textarea name="notes" rows="5" placeholder="Contanos referencias, cantidad de temas, estilo, urgencia o detalles importantes."></textarea>
          <small data-error-for="notes"></small>
        </label>

        <button class="button primary full" type="submit" data-submit-button>Guardar turno</button>
      </form>

      <a class="back-link" href="dashboard.html">Volver al panel</a>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/appointments.js"></script>
</body>
</html>
